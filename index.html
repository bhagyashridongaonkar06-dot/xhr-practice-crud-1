<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xhr crud 1</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">

<body>
    <div class="container">
        <div class="row mt-3">
            <div class="col-md-6 mb-3 offset-md-3">
                <div class="card">
                    <div class="card-body">
                      <form action="" id="postForm">
                        <div class="form-group">
                            <label for="title" class="Cardtitle">Title*</label>
                            <input type="text" id="title" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="body">Body*</label>
                            <textarea rows="4" id="body" class="form-control"> 
                            </textarea>
                        </div>
                        
                        <div class="form-group">
                          <label for="userId">User Id*</label>
                             <select  id="userId" class="form-control">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>  
                             </select>  
                        </div>
                       
                         <button class="btn btn-block btn-outline-primary" id="addPostBtn">Add  Post</button>
                         <button type="button" class="btn btn-block btn-outline-primary d-none" id="updatePostBtn">Update Post</button>
                          
                      </form> 

                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="postContainer">
            <!-- <div class="col-md-3">
                <div class="card">
                    <div class="card-header">

                    </div>
                    <div class="card-body">
                       
                    </div>
                    <div class="card-footer">
                          <button class="btn btn-inline-block btn-outline-primary">Edit</button>
                          <button class="btn btn-inline-block btn-outline-danger">Delete</button>

                    </div>
                </div>
            </div> -->
        </div>
    </div>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
  

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
